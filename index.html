<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚔️ Wordcraft Rally - Colegio Montreal ⚔️</title>
    <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37; --oro-viejo: #a67c00; --pergamino: #f4e4bc;
            --sangre: #8b0000; --sangre-oscura: #5d0000; --madera: #2c1e14;
            --azul-real: #1a237e;
        }
        body {
            background-color: var(--madera);
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: #3e2723; font-family: 'Special Elite', serif;
            display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh;
        }
        .pergamino-principal {
            background-color: var(--pergamino);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 40px; border-radius: 15px; width: 100%; max-width: 900px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 12px solid #5d4037;
            position: relative;
        }
        h1 { font-family: 'MedievalSharp'; text-align: center; color: var(--sangre); font-size: 3rem; margin: 0; }
        .subtitulo { font-family: 'MedievalSharp'; text-align: center; color: var(--oro-viejo); font-size: 1.2rem; margin-bottom: 20px; }
        #timer {
            font-family: 'MedievalSharp'; font-size: 3.5rem; text-align: center; color: var(--sangre);
            margin: 15px 0; border-top: 3px double var(--sangre); border-bottom: 3px double var(--sangre);
            background: rgba(255,255,255,0.2);
        }
        .btn {
            cursor: pointer; padding: 15px; width: 100%; font-family: 'MedievalSharp';
            font-size: 1.2rem; border-radius: 10px; border: 2px solid var(--sangre-oscura);
            transition: 0.3s; text-decoration: none; display: inline-block; text-align: center; font-weight: bold;
        }
        .btn-principal { background: linear-gradient(to bottom, var(--sangre), var(--sangre-oscura)); color: white; }
        .btn-descarga { background: linear-gradient(to bottom, var(--azul-real), #0d1a40); color: white; margin-bottom: 20px; }
        .mision-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px; margin-top: 25px;
        }
        .mision-card {
            background: rgba(255,255,255,0.4); border: 3px solid #8d6e63; padding: 15px;
            text-align: center; cursor: pointer; border-radius: 10px; transition: 0.3s;
        }
        .mision-card:hover { transform: scale(1.05); border-color: var(--oro); box-shadow: 0 0 15px var(--oro); }
        .mision-icon { font-size: 2.5rem; display: block; margin-bottom: 5px; }
        .exito { background: linear-gradient(135deg, #dcedc8, #a5d6a7) !important; border-color: #2e7d32 !important; }
        .fallo { background: linear-gradient(135deg, #ffcdd2, #ef9a9a) !important; border-color: var(--sangre) !important; }
        .zona-entrega { border: 4px dashed var(--sangre); padding: 30px; text-align: center; background: rgba(255,255,255,0.3); border-radius: 15px; }
        #feedback { display: none; margin-top: 20px; padding: 20px; border: 3px solid var(--oro); background: white; border-radius: 10px; }
        .reporte-lista { text-align: left; list-style: none; padding: 0; }
        .reporte-lista li { padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }

        /* --- NUEVOS ESTILOS PARA SOPHIE --- */
        .recuadro-dorado {
            border: 5px solid var(--oro);
            box-shadow: 0 0 20px var(--oro);
            margin: 20px auto;
            padding: 10px;
            background: #fff;
            max-width: 80%;
            border-radius: 8px;
        }
        .aviso-contador {
            font-weight: bold;
            color: var(--sangre);
            text-align: center;
            margin: 10px 0;
            font-size: 1.1rem;
            text-transform: uppercase;
        }
        .instrucciones-mision {
            background: rgba(255, 255, 255, 0.6);
            border-left: 5px solid var(--oro-viejo);
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="pergamino-principal">
    <h1>⚔️ Wordcraft Rally ⚔️</h1>
    <div class="subtitulo">Gesta Digital - Colegio Montreal</div>
    <div id="timer">00:00</div>
    
    <div id="pantalla-registro">
        <label><b>👑 Selecciona tu Reino:</b></label>
        <select id="selectEquipo" style="width:100%; padding:15px; margin:15px 0; font-size:1.1rem; border-radius:8px;">
            <option value="Equipo 1">🏰 ARCADIA (Equipo 1)</option>
            <option value="Equipo 2">☀️ SHURIMA (Equipo 2)</option>
            <option value="Equipo 3">🛡️ DEMACIA (Equipo 3)</option>
            <option value="Equipo 4">🌸 KYOSHU (Equipo 4)</option>
            <option value="Equipo 5">🏹 ARMETIS (Equipo 5)</option>
            <option value="Equipo 6">🌙 BUENANOTTE (Equipo 6)</option>
        </select>
        <button class="btn btn-principal" onclick="comenzarRally()">¡INICIAR LA GESTA!</button>
    </div>

    <div id="pantalla-mapa" style="display:none">
        <div id="lista-misiones" class="mision-grid"></div>
    </div>

    <div id="area-trabajo" style="display:none">
        <button onclick="irAlMapa()" style="color:var(--sangre); cursor:pointer; background:none; border:none; font-weight:bold; font-family:'MedievalSharp'; margin-bottom:15px;">⬅ VOLVER AL MAPA</button>
        <h2 id="titulo-mision" style="text-align:center; color:var(--sangre);"></h2>

        <div class="recuadro-dorado" id="espacio-imagen">
            <p style="text-align:center; color:#8d6e63;">[Imagen de la Misión]</p>
        </div>

        <div class="aviso-contador">
            ⚠️ Una vez iniciado el contador no se detiene
        </div>

        <div class="instrucciones-mision" id="contenedor-instrucciones">
            <strong>📜 Instrucciones:</strong>
            <div id="texto-instrucciones" style="margin-top:10px;"></div>
        </div>

        <div id="descarga-container" style="text-align:center;"></div>
        <div class="zona-entrega">
            <input type="file" id="archivoInput" accept=".docx"><br><br>
            <button id="btnCalificar" class="btn btn-principal" onclick="procesarEntrega()">¡SOLICITAR VEREDICTO!</button>
        </div>
        <div id="feedback"></div>
    </div>
</div>

<script>
const APPSHEET_ID = "a052908b-6997-4e4d-868b-5c0ab8c75d68";
const APPSHEET_KEY = "V2-qFFCd-wZKhA-2ohtA-7Dqcg-eYj0l-djOcp-KLU1t-wev3m";
const TABLA_NOMBRE = "Rally";

const misiones = [
    { 
    id: "M1", 
    titulo: "El Edicto: Configuración Real", 
    icono: "📜", 
    objs: ["sectpr", "page-break", "header", "pgnum", "margin"], 
    nombres: ["Márgenes Personalizados", "Orientación Horizontal", "Saltos de Sección", "Encabezado Diferente", "Numeración (Inicia en 3)"], 
    instrucciones: "Aplica márgenes personalizados, cambia la orientación a horizontal solo en una sección, inserta saltos de sección, configura un encabezado diferente en la primera página y haz que la numeración inicie en 3.",
    url: "https://docs.google.com/uc?export=download&id=1evvJUB2Ifdsipq5u73G_CaW_hDHw92hB" 
},
    { 
    id: "M2", 
    titulo: "El Censo: Estilos y Referencias", 
    icono: "👥", 
    objs: ["h1", "h2", "toc", "line-height", "footnote"], 
    nombres: ["Estilo Título 1 aplicado", "Estilo Título 2 aplicado", "Tabla de contenido generada", "Interlineado modificado", "Nota al pie insertada"], 
    instrucciones: "Aplica estilos Título 1 y 2, modifica un estilo existente, genera una tabla de contenido automática, ajusta el interlineado exacto e inserta una nota al pie.",
    url: "https://docs.google.com/uc?export=download&id=147rbZMsvrlq4B-q4B5LEa3NyAOW9Y9S9" 
},
    { 
    id: "M3", 
    titulo: "El Censo: Tablas y Cálculos", 
    icono: "📊", 
    objs: ["table", "tr-style", "vmerge", "sort", "field", "thead"], 
    nombres: ["Insertar Tabla", "Estilo Personalizado", "Celdas Combinadas", "Orden de Datos", "Fórmula (Suma/Promedio)", "Repetición de Encabezados"], 
    instrucciones: "Inserta una tabla, aplica un estilo personalizado, combina celdas, ordena los datos, inserta una fórmula (Suma o Promedio) y configura la repetición de filas de encabezado.",
    url: "https://docs.google.com/uc?export=download&id=1I_eWG3OpaFzlhanIiAlYfh3LF-oXQ_8h" 
},
    { 
    id: "M4", 
    titulo: "El Espacio: Gráficos y Arte", 
    icono: "🚀", 
    objs: ["img", "drawing", "diagram", "color-map", "3d-scene", "textpath", "align-center"], 
    nombres: ["Imagen Insertada", "Ajuste de Texto 'Cuadrado'", "Efecto Artístico Aplicado", "SmartArt de Ciclo Insertado", "Diseño Multicolor y 3D", "WordArt 'PROYECTO ESPACIAL'", "Alineación Centrada de Objetos"], 
    instrucciones: "Inserta una imagen del espacio con ajuste cuadrado y efecto artístico. Añade un SmartArt de ciclo en 3D/multicolor, un WordArt superior y alinea todo al centro.",
    url: "https://docs.google.com/uc?export=download&id=1xi816rekK44uO840YB1NZHpRGf6_VKLv" 
},
    { 
    id: "M5", 
    titulo: "Sustentabilidad: Diseño de Informe", 
    icono: "🌿", 
    objs: ["theme", "clr-scheme", "powerplus", "pg-borders", "doc-parts", "sustentabilidad"], 
    nombres: ["Tema Orgánico/Integral aplicado", "Paleta de Colores (Verde/Bosque)", "Marca de Agua 'PROYECTO VERDE'", "Bordes de Página (Verde Oscuro)", "Portada Predefinida Insertada", "Título: Informe de Sustentabilidad"], 
    instrucciones: "Aplica el tema Orgánico, cambia la paleta a Verdes, inserta la marca de agua 'PROYECTO VERDE', añade bordes de página y una portada personalizada.",
    url: "https://docs.google.com/uc?export=download&id=1NdUfZM8RiX3nIlyfcZtZvdgHjsPEBd7C" 
},
    { 
    id: "M6", 
    titulo: "Seguridad: Configuración de Sistema", 
    icono: "⚙️", 
    objs: ["glossary", "psi", "font-embed", "recovery-2", "navigation-pane"], 
    nombres: ["Comando de Acceso Rápido Configurado", "Autotexto 'PSI' Creado y Usado", "Fuentes Incrustadas en el Archivo", "Autorrecuperación cada 2 Minutos", "Panel de Navegación Activado"], 
    instrucciones: "Añade comandos de acceso rápido, crea un Autotexto 'PSI', incrusta las fuentes en el archivo y configura la autorrecuperación cada 2 minutos.",
    url: "https://docs.google.com/uc?export=download&id=1L9eYGdN1mH2sSz9Q5hBeHrS39MEWzwf3" 
},
   { 
    id: "M7", 
    titulo: "Criptografía: El Acta Final", 
    icono: "🛡️", 
    objs: ["no-author", "encrypted", "Admin2026", "pdf-trace"], 
    nombres: ["Metadatos e Información Personal eliminados", "Documento Cifrado con Contraseña", "Clave 'Admin2026' correcta", "Rastro de Exportación a PDF detectado"], 
    instrucciones: "Inspecciona y limpia metadatos, protege el documento con la contraseña 'Admin2026' y expórtalo a PDF (sube el .docx aquí).",
    url: "https://docs.google.com/uc?export=download&id=1P8F6o5adlFbbaqqkEN2mVxBRmXLuzan4" 
},
    { 
    id: "M8", 
    titulo: "La Gran Final: Bibliografía Real", 
    icono: "🕊️", 
    objs: ["line-height: 18pt", "hanging", "page-break", "border-bottom", "split"], 
    nombres: ["Interlineado Exacto (18 pto)", "Sangría Francesa (1.25 cm)", "Salto de Página insertado", "Borde Inferior Rojo en Título", "Ventana Dividida (Vista)"], 
    instrucciones: "Configura interlineado exacto de 18pto, aplica sangría francesa, inserta salto de página, añade borde inferior rojo y usa la vista dividida.",
    url: "https://docs.google.com/uc?export=download&id=1j3YyRbJyKpofRWgcsx3JGd91LPGWEL34" 
},
];

let misionesRealizadas = JSON.parse(localStorage.getItem('misionesMontreal')) || {};
let segundosTotales = 0; let cronoInterval = null; let misionActualIdx = null;

function comenzarRally() {
    document.getElementById('pantalla-registro').style.display = 'none';
    document.getElementById('pantalla-mapa').style.display = 'block';
    renderMapa();
}

function renderMapa() {
    const grid = document.getElementById('lista-misiones');
    grid.innerHTML = "";
    misiones.forEach((m, i) => {
        const estado = misionesRealizadas[m.id];
        grid.innerHTML += `<div class="mision-card ${estado || ''}" onclick="${estado ? '' : 'abrirMision('+i+')'}">
            <strong>${m.id}</strong><span class="mision-icon">${m.icono}</span><span>${m.titulo}</span>
        </div>`;
    });
}

function abrirMision(i) {
    misionActualIdx = i; const m = misiones[i];
    document.getElementById('pantalla-mapa').style.display = 'none';
    document.getElementById('area-trabajo').style.display = 'block';
    document.getElementById('titulo-mision').innerText = m.titulo;

    // ACTUALIZA LAS INSTRUCCIONES DINÁMICAMENTE
    document.getElementById('texto-instrucciones').innerHTML = m.instrucciones;

    document.getElementById('descarga-container').innerHTML = `<a href="${m.url}" class="btn btn-descarga">📥 BAJAR PERGAMINO ${m.id}</a>`;
    document.getElementById('feedback').style.display = 'none';
    if(!cronoInterval) cronoInterval = setInterval(() => { segundosTotales++; document.getElementById('timer').innerText = formatTimer(segundosTotales); }, 1000);
}

function formatTimer(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

async function enviarAAppSheet(equipo, misionId, calif, tiempo) {
    const url = `https://api.appsheet.com/api/v2/apps/${APPSHEET_ID}/tables/${TABLA_NOMBRE}/Action`;
    const num = misionId.replace("M", "");
    const filaUpdate = { "Equipo": equipo };
    filaUpdate[`Calif E${num}`] = calif.toString();
    filaUpdate[`Tiempo E${num}`] = tiempo;
    try {
        await fetch(url, { method: 'POST', headers: { 'ApplicationAccessKey': APPSHEET_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ "Action": "Edit", "Rows": [ filaUpdate ] })
        });
    } catch (e) { console.error(e); }
}

async function procesarEntrega() {
    const fileInput = document.getElementById('archivoInput');
    if(!fileInput.files[0]) return alert("¡Sube tu pergamino!");
    clearInterval(cronoInterval); cronoInterval = null; 
    const reader = new FileReader();
    reader.onload = async (e) => {
        const { value: html } = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
        const m = misiones[misionActualIdx];
        let aciertos = 0; let reporte = `<ul class="reporte-lista">`;
        m.objs.forEach((obj, idx) => {
            const ok = html.toLowerCase().includes(obj.toLowerCase());
            if(ok) { aciertos++; reporte += `<li style="color:green">✅ ${m.nombres[idx]}</li>`; }
            else { reporte += `<li style="color:red">❌ ${m.nombres[idx]}</li>`; }
        });
        reporte += `</ul>`;
        const calif = Math.round((aciertos / m.objs.length) * 100);
        misionesRealizadas[m.id] = (calif >= 70) ? 'exito' : 'fallo';
        localStorage.setItem('misionesMontreal', JSON.stringify(misionesRealizadas));
        await enviarAAppSheet(document.getElementById('selectEquipo').value, m.id, calif, document.getElementById('timer').innerText);
        const feedback = document.getElementById('feedback');
        feedback.innerHTML = `<h3>Veredicto: ${calif}%</h3>${reporte}<p>Gesta grabada.</p>`;
        feedback.style.display = 'block'; document.getElementById('btnCalificar').disabled = true;
    };
    reader.readAsArrayBuffer(fileInput.files[0]);
}

function irAlMapa() { document.getElementById('area-trabajo').style.display = 'none'; document.getElementById('pantalla-mapa').style.display = 'block'; renderMapa(); }
</script>
</body>
</html>
